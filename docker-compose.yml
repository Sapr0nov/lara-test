services:
  nginx:
    build: ./docker/nginx
    networks:
      test:
        aliases:
          - nginx
    ports:
      - ${PUB_HTTP_PORT}:80
      - ${PUB_HTTPS_PORT}:443
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./:/var/www

  test-data:
    container_name: test-data
    image: php:8.4-fpm
    command: bash -c "docker-php-ext-install pdo_mysql && php-fpm"
    networks:
      test:
        aliases:
          - laravel
    environment:
      XDEBUG_PORT: 9000
      XDEBUG_HOST: 127.0.0.1
      XDEBUG_IDKEY: DEFKEY
    volumes:
      - ./:/var/www
    tmpfs:
      - /tmp
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: test-mysql
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      test:
        aliases:
          - mysql

volumes:
  mysql-data:

networks:
  test:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.251.0/24